<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Between the Bread — Random Sandwich Generator</title>
    <meta
      name="description"
      content="Discover your next sandwich with Between the Bread's random sandwich generator. Roll the dice, mix ingredients, and find your perfect combo."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://betweenbread.co/" />
    <meta property="og:title" content="Between the Bread — Random Sandwich Generator" />
    <meta
      property="og:description"
      content="Discover your next sandwich with Between the Bread's random sandwich generator. Roll the dice, mix ingredients, and find your perfect combo."
    />
    <meta property="og:image" content="https://betweenbread.co/og-image.png" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Between the Bread — Random Sandwich Generator" />
    <meta
      name="twitter:description"
      content="Discover your next sandwich with Between the Bread's random sandwich generator. Roll the dice, mix ingredients, and find your perfect combo."
    />
    <meta name="twitter:image" content="https://betweenbread.co/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Google Fonts: preconnect to reduce DNS/TLS latency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Libre Baskerville: 400 (regular), 400i (italic), 700 (bold) — display/headings
      DM Sans: 400, 500, 600, 700 — UI labels and body copy
      display=swap: render fallback font immediately, swap when fonts load
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
